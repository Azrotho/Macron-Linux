DEFAULT linux
TIMEOUT 50
PROMPT 0

LABEL linux
    MENU LABEL MacronLinux — En mARCH! 🇫🇷
    LINUX /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux
    INITRD /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
    APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% console=tty1 console=ttyS0

LABEL linux-fallback
    MENU LABEL MacronLinux — En mARCH! (fallback initramfs)
    LINUX /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux
    INITRD /%INSTALL_DIR%/boot/x86_64/initramfs-linux-fallback.img
    APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% console=tty1 console=ttyS0
